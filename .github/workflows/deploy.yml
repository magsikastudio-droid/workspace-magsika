name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Build frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Copy frontend build to VPS
        run: |
          ssh -i ~/.ssh/deploy_key root@${{ secrets.VPS_HOST }} "rm -rf /root/admin-dashboard/frontend/dist && mkdir -p /root/admin-dashboard/frontend/dist"
          scp -i ~/.ssh/deploy_key -r frontend/dist/* root@${{ secrets.VPS_HOST }}:/root/admin-dashboard/frontend/dist/

      - name: Copy backend to VPS
        run: |
          scp -i ~/.ssh/deploy_key backend/main.py root@${{ secrets.VPS_HOST }}:/root/admin-dashboard/backend/

      - name: Restart service
        run: |
          ssh -i ~/.ssh/deploy_key root@${{ secrets.VPS_HOST }} "systemctl restart admin-dashboard"
