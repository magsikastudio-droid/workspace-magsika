name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Build frontend
        env:
          VITE_BACKEND_URL: /api
        run: |
          cd frontend
          npm install
          npm run build

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          cat >> ~/.ssh/config <<EOF
          Host vps
            HostName ${{ secrets.VPS_HOST }}
            User root
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
          EOF

      - name: Copy frontend build to VPS
        run: |
          ssh vps "rm -rf /root/admin-dashboard/frontend/dist && mkdir -p /root/admin-dashboard/frontend/dist"
          scp -r frontend/dist/* vps:/root/admin-dashboard/frontend/dist/

      - name: Copy backend to VPS
        run: |
          scp backend/main.py vps:/root/admin-dashboard/backend/
          scp backend/requirements.txt vps:/root/admin-dashboard/backend/

      - name: Install Python dependencies on VPS
        run: |
          ssh vps "/root/admin-dashboard/backend/.venv/bin/pip install -r /root/admin-dashboard/backend/requirements.txt -q"

      - name: Restart service
        run: |
          ssh vps "systemctl restart admin-dashboard"
